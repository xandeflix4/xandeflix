<!doctype html>
<html lang="en">
  <head>
    <script>
      /* Escudo de Compatibilidade para Smart TVs e Firestick */
      if (typeof globalThis === 'undefined') {
        window.globalThis = window;
      }
      if (typeof window.global === 'undefined') {
        window.global = window;
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#050505" />
    <title>Xandeflix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
  </head>
  <body class="bg-black">
    <script>
      (function() {
        var debugHudEnabled = /\bdebugHud=1\b/.test(window.location.search);

        if (!debugHudEnabled) {
          return;
        }

        var originalLog = console.log;
        var originalError = console.error;
        var originalWarn = console.warn;
        var debugDiv = null;

        function createLogger() {
          if (debugDiv) return;
          debugDiv = document.createElement('div');
          debugDiv.id = 'tv-debug-log';
          debugDiv.style.cssText = 'position: fixed; top: 0; left: 0; width: 100vw; max-height: 42vh; background: rgba(0,0,0,0.72); color: #00FF00; font-family: monospace; font-size: 13px; z-index: 999999; overflow-y: auto; padding: 12px 14px; pointer-events: none; word-wrap: break-word; display: none;';
          document.body.appendChild(debugDiv);
          originalLog('[XANDEFLIX-STORE] HUD Debug Ativado');
        }

        function addLog(msg, isError) {
          if (!debugDiv) {
            if (!document.body) return;
            createLogger();
          }
          debugDiv.style.display = 'block';
          var p = document.createElement('p');
          p.style.margin = '4px 0';
          if (isError) {
            p.style.color = '#FF5555';
            p.style.fontWeight = 'bold';
            p.style.fontSize = '18px';
            p.style.borderLeft = '4px solid #FF5555';
            p.style.paddingLeft = '10px';
          }
          p.innerText = '[' + new Date().toLocaleTimeString() + '] ' + (typeof msg === 'object' ? JSON.stringify(msg) : msg);
          debugDiv.appendChild(p);
          debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        console.log = function() {
          originalLog.apply(console, arguments);
          addLog(Array.prototype.slice.call(arguments).join(' '), false);
        };
        console.warn = function() {
          originalWarn.apply(console, arguments);
          addLog(Array.prototype.slice.call(arguments).join(' '), false);
        };
        console.error = function() {
          originalError.apply(console, arguments);
          addLog(Array.prototype.slice.call(arguments).join(' '), true);
        };

        window.onerror = function(msg, url, lineNo, columnNo, error) {
          addLog('FATAL ERROR: ' + msg + ' at ' + url + ':' + lineNo + ':' + columnNo, true);
          return false;
        };

        window.addEventListener('unhandledrejection', function(event) {
          addLog('PROMISE REJECTED: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown Reason'), true);
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

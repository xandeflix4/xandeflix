<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xandeflix | Auditoria Ultra Compact</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --netflix-red: #E50914; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .btn-primary { background-color: var(--netflix-red); transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3); }
        .input-dark { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; border-radius: 12px; padding: 10px 16px; font-size: 13px; color: white; transition: border-color 0.2s; text-align: center; }
        .input-dark:focus { border-color: var(--netflix-red); outline: none; }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); position: fixed; inset: 0; z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-open { display: flex; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        /* Neon Colors for TITLES */
        .neon-blue { color: #00f2ff; text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .neon-green { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.5); }
        .neon-orange { color: #ffaa00; text-shadow: 0 0 10px rgba(255, 170, 0, 0.5); }
        .neon-red { color: #ff0033; text-shadow: 0 0 10px rgba(255, 0, 51, 0.5); }
        .neon-white { color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); }

        .stat-card-blue { border: 1px solid rgba(0, 242, 255, 0.15); background: linear-gradient(135deg, rgba(0, 242, 255, 0.05) 0%, rgba(0, 242, 255, 0) 100%); }
        .stat-card-green { border: 1px solid rgba(0, 255, 136, 0.15); background: linear-gradient(135deg, rgba(0, 255, 136, 0.05) 0%, rgba(0, 255, 136, 0) 100%); }
        .stat-card-orange { border: 1px solid rgba(255, 170, 0, 0.15); background: linear-gradient(135deg, rgba(255, 170, 0, 0.03) 0%, rgba(255, 170, 0, 0.01) 100%); }
        .stat-card-red { border: 1px solid rgba(255, 0, 51, 0.15); background: linear-gradient(135deg, rgba(255, 0, 51, 0.03) 0%, rgba(255, 0, 51, 0.01) 100%); }
        .stat-card-white { border: 1px solid rgba(255, 255, 255, 0.1); background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%); }

        .subcat-item { cursor: pointer; transition: all 0.1s; border-left: 3px solid transparent; }
        .subcat-item:hover { background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--netflix-red); }
        .subcat-active { background: rgba(229, 9, 20, 0.2) !important; border-left: 3px solid var(--netflix-red) !important; color: white !important; font-weight: 800; }
        
        .cat-list-item { transition: all 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .cat-list-item:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body class="min-h-screen">

    <!-- MODAL: AUDIT DRILL-DOWN -->
    <div id="scannerDetailsModal" class="modal-overlay">
        <div class="glass w-full h-[90vh] max-w-7xl mx-4 rounded-[40px] flex flex-col overflow-hidden border-white/5 shadow-2xl">
            <div class="p-6 border-b border-white/10 flex justify-between items-center bg-black/40">
                <h2 id="auditModalTitle" class="text-2xl font-black italic uppercase tracking-tighter neon-white ml-4">Auditoria Master</h2>
                <button onclick="closeDetailsModal()" class="text-gray-500 hover:text-white text-2xl px-4">✕</button>
            </div>
            <div class="flex-1 flex overflow-hidden">
                <div class="w-80 border-r border-white/5 flex flex-col bg-black/20">
                    <div class="p-4 border-b border-white/5 bg-black/20"><input type="text" id="auditSearchSub" oninput="filterSubcategories()" class="bg-white/5 border border-white/5 p-3 rounded-xl w-full text-[10px] uppercase font-black text-white italic" placeholder="Mapear subpasta..."></div>
                    <div class="flex-1 overflow-y-auto" id="auditSubList"></div>
                </div>
                <div class="flex-1 overflow-y-auto p-8 bg-[#050505]" id="auditItemList">
                    <div class="flex flex-col items-center justify-center h-full text-white/5 italic uppercase tracking-widest font-black"><span class="text-6xl mb-4">⬅️</span>Selecione a Subcategoria</div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN UI -->
    <div id="mainPortalUI" class="hidden opacity-0 transition-opacity duration-1000 flex font-inter">
        <div class="w-60 glass h-screen fixed flex flex-col z-50">
            <div class="p-6 text-center border-b border-white/5"><div class="text-3xl font-black text-[#E50914] italic">XANTEFLIX</div></div>
            <nav class="flex-1 px-4 mt-8 space-y-2">
                <div onclick="switchTab('users')" id="btnUsers" class="flex items-center p-4 bg-red-600/10 border-red-600/20 rounded-2xl text-white cursor-pointer"><span class="font-black text-xs uppercase italic tracking-widest">Base de Perfis</span></div>
                <div onclick="switchTab('scanner')" id="btnScanner" class="flex items-center p-4 hover:bg-white/5 rounded-2xl text-gray-400 cursor-pointer"><span class="font-black text-xs uppercase italic tracking-widest">Audit Playlist</span></div>
            </nav>
            <div class="p-6 border-t border-white/5"><button onclick="clearLogout()" class="w-full text-[10px] font-bold text-gray-800 hover:text-red-500 uppercase italic">Logout</button></div>
        </div>
        <main class="ml-60 p-6 w-full min-h-screen">
            <div id="tabContentUsers">
                <div class="flex justify-between items-center mb-8 px-2">
                    <h1 class="text-3xl font-black text-white italic tracking-tighter uppercase m-0">Gestão Master</h1>
                    <button onclick="openAddModal()" class="btn-primary px-8 py-3 rounded-2xl font-black uppercase text-[10px] text-white shadow-xl">+ Novo Perfil</button>
                </div>
                <div class="glass rounded-[24px] overflow-hidden flex flex-col mx-2 h-[calc(100vh-120px)] min-h-[500px]">
                    <div id="usersDisplayList" class="flex-1 overflow-y-auto divide-y divide-white/5 pb-4"></div>
                    <div class="p-4 border-t border-white/5 bg-black/40 flex justify-between items-center text-[10px] font-black uppercase text-gray-500">
                        <button onclick="changeUserPage(-1)" id="btnPrevPage" class="px-5 py-2 bg-white/5 hover:bg-white/10 hover:text-white rounded-lg disabled:opacity-30 transition-colors">Voltar</button>
                        <span id="pageIndicator" class="tracking-widest neon-red text-[9px]">Pág 1 / 1</span>
                        <button onclick="changeUserPage(1)" id="btnNextPage" class="px-5 py-2 bg-white/5 hover:bg-white/10 hover:text-white rounded-lg disabled:opacity-30 transition-colors">Avançar</button>
                    </div>
                </div>
            </div>
            <!-- TAB SCANNER -->
            <div id="tabContentScanner" class="hidden">
                 <h1 class="text-3xl font-black tracking-tighter mb-8 italic text-white px-2 uppercase">Explorador Auditor</h1>
                 <div class="grid grid-cols-5 gap-4 mb-8 px-2 text-center">
                    <div class="stat-card p-4 rounded-[20px] stat-card-white"><div class="text-[9px] neon-white italic uppercase mb-1 font-black tracking-widest">Pastas</div><div class="text-xl font-black text-white" id="statCats">0</div></div>
                    <div class="stat-card p-4 rounded-[20px] stat-card-blue"><div class="text-[9px] neon-blue italic uppercase mb-1 font-black tracking-widest">Canais TV</div><div class="text-xl font-black text-white" id="statLive">0</div></div>
                    <div class="stat-card p-4 rounded-[20px] stat-card-green"><div class="text-[9px] neon-green italic uppercase mb-1 font-black tracking-widest">VOD Filmes</div><div class="text-xl font-black text-white" id="statMovies">0</div></div>
                    <div class="stat-card p-4 rounded-[20px] stat-card-orange"><div class="text-[9px] neon-orange italic uppercase mb-1 font-black tracking-widest">VOD Séries</div><div class="text-xl font-black text-white" id="statSeries">0</div></div>
                    <div class="stat-card p-4 rounded-[20px] stat-card-red"><div class="text-[9px] neon-red italic uppercase mb-1 font-black tracking-widest">Total Playlist</div><div class="text-xl font-black text-white" id="statTotal">0</div></div>
                 </div>
                 <div class="glass p-6 rounded-[24px] mb-8 mx-2 flex gap-4">
                     <input type="text" id="m3uUrlInput" class="input-dark flex-1 italic text-left" placeholder="URL M3U Master aqui...">
                     <button onclick="startM3UScan()" id="scanMainBtn" class="btn-primary px-10 font-black uppercase text-xs text-white rounded-2xl">Mapear Agora</button>
                 </div>
                 
                 <!-- COMPACT LIST -->
                 <div id="scanResultUI" class="mx-2 glass rounded-[20px] overflow-hidden border-white/5 divide-y divide-white/5"></div>
            </div>
        </main>
    </div>

    <!-- ADD/EDIT USER MODAL -->
    <div id="userModal" class="modal-overlay">
        <div class="glass p-10 rounded-[32px] w-full max-w-xl mx-4 relative">
            <button onclick="closeModal()" class="absolute top-6 right-8 text-gray-600 hover:text-white text-3xl transition-colors">✕</button>
            <h2 id="modalUserTitle" class="text-2xl font-black text-white italic uppercase mb-8">Novo Perfil</h2>
            <div class="space-y-4">
                <input type="hidden" id="editUserId">
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase italic mb-1 block ml-2">Identificação / Nome</label>
                    <input type="text" id="addUName" class="input-dark text-left" placeholder="Nome do Cliente ou Admin">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase italic mb-1 block ml-2">Login de Acesso</label>
                    <input type="text" id="addUUser" class="input-dark text-left" placeholder="E-mail ou Usuário">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase italic mb-1 block ml-2">Senha Master</label>
                    <input type="password" id="addUPass" class="input-dark text-left" placeholder="Deixe vazio para manter atual">
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase italic mb-1 block ml-2">Nível de Acesso (Cargo)</label>
                    <select id="addUserRole" class="input-dark text-left bg-[#050505]"><option value="user">Cliente Padrão</option><option value="admin">Administrador Master</option></select>
                </div>
                <div>
                    <label class="text-[9px] font-black text-gray-500 uppercase italic mb-1 block ml-2">Configuração M3U Privada</label>
                    <input type="text" id="addUPlaylist" class="input-dark text-left font-mono text-[9px]" placeholder="URL M3U Master">
                </div>
                <button onclick="saveUserForm()" id="btnSaveUser" class="btn-primary w-full py-4 mt-4 rounded-2xl font-black uppercase text-xs text-white shadow-xl">Gravar Alterações</button>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="loginGate" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#050505]">
        <div class="glass p-12 rounded-[40px] max-w-md w-full mx-4 text-center border-red-600/10 shadow-2xl">
            <div class="text-5xl font-black text-[#E50914] mb-2 italic tracking-tighter uppercase">XANDEFLIX</div>
            <div class="text-[11px] font-black text-white/20 mb-10 tracking-[0.4em] uppercase">Setor Administrativo</div>
            <input type="text" id="loginSupabaseUrl" class="input-dark w-full mb-3 text-left font-mono text-[10px]" placeholder="Supabase URL (https://xxxxx.supabase.co)">
            <input type="password" id="loginSupabaseKey" class="input-dark w-full mb-4 text-left font-mono text-[10px]" placeholder="Supabase Anon Key (JWT)">
            <input type="text" id="loginUser" onkeyup="if(event.key==='Enter')handleSystemLogin()" class="input-dark w-full mb-4" placeholder="E-mail ou ID Admin">
            <input type="password" id="loginPass" onkeyup="if(event.key==='Enter')handleSystemLogin()" class="input-dark w-full mb-6" placeholder="Senha Master">
            <button onclick="handleSystemLogin()" id="btnLogin" class="btn-primary w-full py-5 rounded-2xl font-black uppercase text-xs text-white">Validar Identidade</button>
        </div>
    </div>

    <script>
        const MASTER_URL = "https://vvmsmrcyovwnfstohbiv.supabase.co";
        const MASTER_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2bXNtcmN5b3Z3bmZzdG9oYml2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODQyNzIsImV4cCI6MjA5MDM2MDI3Mn0.fiOYERdIXRppudh4-UH8UM2gMGn-NDRFG04PVhoQcDs";
        let S_URL = localStorage.getItem('XF_S_URL') || MASTER_URL;
        let S_KEY = localStorage.getItem('XF_S_KEY') || MASTER_KEY;
        let xfClientInstance = null;
        let scannerFullData = {};

        function hydrateConnectionFields() {
            const urlInput = document.getElementById('loginSupabaseUrl');
            const keyInput = document.getElementById('loginSupabaseKey');
            if (urlInput) urlInput.value = S_URL;
            if (keyInput) keyInput.value = S_KEY;
        }

        function applyConnectionFields() {
            const urlInput = document.getElementById('loginSupabaseUrl');
            const keyInput = document.getElementById('loginSupabaseKey');
            const nextUrl = (urlInput?.value || '').trim();
            const nextKey = (keyInput?.value || '').trim();

            S_URL = nextUrl;
            S_KEY = nextKey;
            xfClientInstance = null;

            if (nextUrl) localStorage.setItem('XF_S_URL', nextUrl);
            else localStorage.removeItem('XF_S_URL');

            if (nextKey) localStorage.setItem('XF_S_KEY', nextKey);
            else localStorage.removeItem('XF_S_KEY');
        }

        function getClient() {
            if (xfClientInstance) return xfClientInstance;
            if (!S_URL || !S_KEY) return null;
            if (window.supabase) { xfClientInstance = window.supabase.createClient(S_URL, S_KEY); return xfClientInstance; }
            return null;
        }

        async function handleSystemLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const loginButton = document.getElementById('btnLogin');
            applyConnectionFields();

            if (!user || !pass) {
                alert('Informe usuario e senha para continuar.');
                return;
            }

            const originalText = loginButton.innerText;
            loginButton.disabled = true;
            loginButton.innerText = 'Validando...';

            if (!S_URL || !S_KEY) {
                alert('Informe Supabase URL e Supabase Anon Key para continuar.');
                loginButton.disabled = false;
                loginButton.innerText = originalText;
                return;
            }

            const client = getClient();
            if (!client) {
                alert('Falha ao inicializar cliente Supabase. Verifique URL/KEY.');
                loginButton.disabled = false;
                loginButton.innerText = originalText;
                return;
            }

            try {
                const { data: authData, error: authError } = await client.auth.signInWithPassword({ email: user, password: pass });
                if (authData.user) {
                    const { data: p } = await client.from('xandeflix_users').select('role').eq('auth_user_id', authData.user.id).single();
                    if (p && p.role === 'admin') return grantAccess();
                }

                const { data: dbUsers, error: dbError } = await client
                    .from('xandeflix_users')
                    .select('*')
                    .or(`username.eq.${user},email.eq.${user},access_id.eq.${user}`);

                if (dbUsers && dbUsers.length > 0) {
                    const adminMatch = dbUsers.find((u) => u.role === 'admin');
                    if (adminMatch) {
                        const plainMatch = adminMatch.password === pass;
                        const bcryptMatch = window.dcodeIO && window.dcodeIO.bcrypt
                            ? window.dcodeIO.bcrypt.compareSync(pass, adminMatch.password || '')
                            : false;
                        if (plainMatch || bcryptMatch) {
                            return grantAccess();
                        }
                    }
                }

                const reason = authError?.message || dbError?.message || 'Credenciais invalidas ou perfil sem permissao de administrador.';
                alert(`Acesso negado.\n${reason}`);
            } catch (e) {
                const message = e && e.message ? e.message : 'Falha na autenticacao. Verifique credenciais e configuracao do Supabase.';
                alert(message);
            } finally {
                loginButton.disabled = false;
                loginButton.innerText = originalText;
            }
        }

        function grantAccess() {
            sessionStorage.setItem('XF_ADMIN_LOGGED', 'true');
            document.getElementById('loginGate').classList.add('hidden');
            document.getElementById('mainPortalUI').classList.remove('hidden');
            setTimeout(() => document.getElementById('mainPortalUI').classList.remove('opacity-0'), 10);
            refreshUsers();
        }

        function clearLogout() {
            sessionStorage.removeItem('XF_ADMIN_LOGGED');
            location.reload();
        }

        function checkAdminSession() {
            if (sessionStorage.getItem('XF_ADMIN_LOGGED') === 'true') { grantAccess(); }
        }

        let currentUsersPage = 1;
        const USERS_PER_PAGE = 50;

        async function refreshUsers() {
            const client = getClient();
            const { data } = await client.from('xandeflix_users').select('*').order('created_at', { ascending: false });
            if (!data) return;
            window.allUsers = data; 
            renderUsersPage();
        }

        function renderUsersPage() {
            const list = document.getElementById('usersDisplayList');
            if(!window.allUsers || window.allUsers.length === 0) {
                 list.innerHTML = '<div class="p-10 text-center text-gray-500 text-[10px] font-black uppercase italic">Nenhum perfil encontrado</div>';
                 return;
            }
            const totalPages = Math.ceil(window.allUsers.length / USERS_PER_PAGE);
            if(currentUsersPage < 1) currentUsersPage = 1;
            if(currentUsersPage > totalPages) currentUsersPage = totalPages;
            
            const start = (currentUsersPage - 1) * USERS_PER_PAGE;
            const pageData = window.allUsers.slice(start, start + USERS_PER_PAGE);
            
            list.innerHTML = pageData.map(u => `
                <div class="p-4 flex justify-between items-center transition-all hover:bg-white/[0.02]">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 border border-white/10 rounded-xl flex items-center justify-center font-black text-red-500 italic text-base uppercase">${(u.name || "U").charAt(0).toUpperCase()}</div>
                        <div><div class="font-black text-white text-sm uppercase italic leading-tight">${u.name}</div><div class="text-[8px] text-gray-700 font-bold uppercase tracking-widest mt-0.5">${u.username} • ${u.role === 'admin' ? '<span class="text-red-500">ADMIN</span>' : 'USER'}</div></div>
                    </div>
                    <div class="flex gap-2 mr-2">
                        <button onclick="editUser('${u.id}')" class="px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/5 rounded-lg text-[8px] font-black uppercase text-gray-400 hover:text-white transition-all">Editar</button>
                        <button onclick="deleteUser('${u.id}')" class="px-3 py-1.5 bg-red-900/20 hover:bg-red-600 border border-transparent rounded-lg text-[8px] font-black uppercase text-red-500 hover:text-white transition-all">Del</button>
                    </div>
                </div>`).join('');
                
            document.getElementById('pageIndicator').innerText = `PÁG. ${currentUsersPage} DA ${totalPages} [${window.allUsers.length} MATRÍCULAS]`;
            document.getElementById('btnPrevPage').disabled = currentUsersPage === 1;
            document.getElementById('btnNextPage').disabled = currentUsersPage === totalPages;
        }

        function changeUserPage(dir) {
            currentUsersPage += dir;
            renderUsersPage();
        }

        function switchTab(t) {
            document.getElementById('tabContentUsers').classList.add('hidden');
            document.getElementById('tabContentScanner').classList.add('hidden');
            document.getElementById('tabContent' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('hidden');
            document.getElementById('btnUsers').classList.remove('bg-red-600/10', 'text-white');
            document.getElementById('btnScanner').classList.remove('bg-red-600/10', 'text-white');
            document.getElementById('btn' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('bg-red-600/10', 'text-white');
        }

        async function startM3UScan() {
            const url = document.getElementById('m3uUrlInput').value.trim(); if(!url) return;
            document.getElementById('scanMainBtn').disabled = true;
            scannerFullData = {};
            const r = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
            if (r.ok) await processStream(r.body);
            document.getElementById('scanMainBtn').disabled = false;
        }

        async function processStream(stream) {
            let cC = 0, cL = 0, cM = 0, cS = 0, cT = 0;
            const updateUI = () => {
                document.getElementById('statCats').innerText = cC;
                document.getElementById('statLive').innerText = cL.toLocaleString();
                document.getElementById('statMovies').innerText = cM.toLocaleString();
                document.getElementById('statSeries').innerText = cS.toLocaleString();
                document.getElementById('statTotal').innerText = cT.toLocaleString();
            };
            const rd = stream.getReader(); const dec = new TextDecoder();
            let buf = ""; let curN = ""; let curG = "";
            while(true) {
                const { done, value } = await rd.read(); if (done) break;
                buf += dec.decode(value, { stream: true });
                const lines = buf.split('\n'); buf = lines.pop() || "";
                for (let l of lines) {
                    const s = l.trim();
                    if (s.startsWith('#EXTINF:')) {
                        curN = s.substring(s.lastIndexOf(',') + 1).trim();
                        const m = s.match(/group-title="([^"]+)"/i);
                        curG = m ? m[1] : "OUTROS";
                    } else if (s.startsWith('http')) {
                        cT++;
                        const parts = curG.split('|').map(p => p.trim());
                        const cat = parts[0] || "OUTROS"; const sub = parts[1] || "GERAL";
                        if (!scannerFullData[cat]) { scannerFullData[cat] = {}; cC++; }
                        if (!scannerFullData[cat][sub]) scannerFullData[cat][sub] = [];
                        scannerFullData[cat][sub].push(curN);
                        const ug = curG.toUpperCase();
                        if (ug.includes('CANAL') || ug.includes('LIVE') || ug.includes('TV')) cL++;
                        else if (ug.includes('SERIE') || ug.includes('SÉRIE')) cS++;
                        else if (ug.includes('FILME') || ug.includes('MOVIE')) cM++; else cL++;
                    }
                }
                if (cT % 1000 === 0) updateUI();
            }
            updateUI(); renderTree();
        }

        function renderTree() {
            const container = document.getElementById('scanResultUI');
            container.innerHTML = Object.keys(scannerFullData).sort().map(cat => {
                let icon = "📁";
                const upC = cat.toUpperCase();
                if (upC.includes('FILME')) icon = "🍿"; else if (upC.includes('SERIE')) icon = "📺"; else if (upC.includes('CANAL')) icon = "📡";
                return `
                <div onclick="openDetailsModal('${cat}')" class="cat-list-item p-4 flex justify-between items-center cursor-pointer group">
                    <div class="flex items-center gap-5">
                        <div class="text-xl opacity-60 group-hover:scale-110 transition-transform">${icon}</div>
                        <div>
                            <div class="font-black text-white text-base uppercase italic group-hover:text-red-500 transition-colors tracking-tight">${cat}</div>
                            <div class="text-[8px] font-black text-gray-800 uppercase tracking-widest mt-0.5">${Object.keys(scannerFullData[cat]).length} Subpastas Mapeadas</div>
                        </div>
                    </div>
                    <div class="w-8 h-8 border border-white/5 rounded-full flex items-center justify-center group-hover:bg-red-600 transition-all text-white text-[10px]">→</div>
                </div>`;
            }).join('');
        }

        function openDetailsModal(cat) {
            document.getElementById('auditModalTitle').innerText = cat;
            document.getElementById('auditSearchSub').value = "";
            renderSubList(cat);
            document.getElementById('scannerDetailsModal').classList.add('modal-open');
        }

        function renderSubList(cat, filter = "") {
            const list = document.getElementById('auditSubList');
            const subs = Object.keys(scannerFullData[cat]).sort().filter(s => s.toUpperCase().includes(filter.toUpperCase()));
            list.innerHTML = subs.map(sub => `<div onclick="selectSub('${cat}', '${sub}', this)" class="subcat-item p-4 text-[10px] font-black uppercase text-gray-700 border-b border-white/5 flex justify-between items-center transition-all"><span>${sub}</span><span class="text-[8px] font-mono opacity-30">[${scannerFullData[cat][sub].length}]</span></div>`).join('');
        }

        function filterSubcategories() { renderSubList(document.getElementById('auditModalTitle').innerText, document.getElementById('auditSearchSub').value); }
        function selectSub(cat, sub, el) {
            document.querySelectorAll('.subcat-item').forEach(i => i.classList.remove('subcat-active')); el.classList.add('subcat-active');
            const items = scannerFullData[cat][sub];
            document.getElementById('auditItemList').innerHTML = `
                <div class="mb-6 border-b border-white/10 pb-4 flex justify-between items-end"><span class="text-[10px] font-black text-red-500 uppercase italic tracking-widest">Auditando: ${sub}</span><span class="text-[8px] font-black text-gray-800 uppercase">${items.length} ITENS</span></div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2">${items.map(i => `<div class="bg-white/5 p-4 rounded-xl text-[9px] font-black text-gray-700 uppercase truncate hover:text-white transition-all border border-white/5">${i}</div>`).join('')}</div>`;
        }

        function closeDetailsModal() { document.getElementById('scannerDetailsModal').classList.remove('modal-open'); }
        
        function openAddModal() {
            document.getElementById('editUserId').value = '';
            document.getElementById('addUName').value = '';
            document.getElementById('addUUser').value = '';
            document.getElementById('addUPass').value = '';
            document.getElementById('addUPlaylist').value = '';
            document.getElementById('addUserRole').value = 'user';
            document.getElementById('modalUserTitle').innerText = 'Novo Perfil';
            document.getElementById('btnSaveUser').innerText = 'Criar Perfil';
            document.getElementById('userModal').classList.add('modal-open');
        }

        function closeModal() { document.getElementById('userModal').classList.remove('modal-open'); }

        function editUser(id) {
            const u = window.allUsers.find(x => x.id === id);
            if (!u) return;
            document.getElementById('editUserId').value = u.id;
            document.getElementById('addUName').value = u.name || '';
            document.getElementById('addUUser').value = u.email || u.username || '';
            document.getElementById('addUPass').value = ''; // Mantém oculto
            document.getElementById('addUPlaylist').value = u.playlist_url || '';
            document.getElementById('addUserRole').value = u.role || 'user';
            document.getElementById('modalUserTitle').innerText = 'Editar Perfil';
            document.getElementById('btnSaveUser').innerText = 'Mudar Dados';
            document.getElementById('userModal').classList.add('modal-open');
        }

        async function deleteUser(id) {
            if (!confirm("Tem certeza que deseja excluir este perfil do sistema?")) return;
            await getClient().from('xandeflix_users').delete().eq('id', id);
            refreshUsers();
        }

        async function saveUserForm() {
            const client = getClient();
            if (!client) {
                alert('Configure Supabase URL/KEY e faca login novamente.');
                return;
            }
            const id = document.getElementById('editUserId').value;
            const nm = document.getElementById('addUName').value.trim();
            const un = document.getElementById('addUUser').value.trim();
            let pw = document.getElementById('addUPass').value.trim();
            const rl = document.getElementById('addUserRole').value;
            const pl = document.getElementById('addUPlaylist').value.trim();
            const btn = document.getElementById('btnSaveUser');

            if (!nm || !un) return;
            btn.disabled = true; btn.innerText = "Processando...";
            
            try {
                let updates = { name: nm, username: un, role: rl };
                if (pw) {
                    if (!(window.dcodeIO && window.dcodeIO.bcrypt)) {
                        throw new Error('Biblioteca de hash indisponivel no navegador.');
                    }

                    updates.password = await new Promise((resolve, reject) => {
                        window.dcodeIO.bcrypt.hash(pw, 10, (err, hash) => {
                            if (err || !hash) reject(err || new Error('Falha ao gerar hash da senha.'));
                            else resolve(hash);
                        });
                    });
                }
                if (pl) updates.playlist_url = pl;

                if (id) { await client.from('xandeflix_users').update(updates).eq('id', id); }
                else { await client.from('xandeflix_users').insert([updates]); }
                closeModal(); refreshUsers();
            } catch(e) { alert('Erro: ' + e.message); } 
            finally { btn.disabled = false; }
        }

        hydrateConnectionFields();
        getClient();
        checkAdminSession();
    </script>
</body>
</html>
